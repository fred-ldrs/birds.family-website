<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; script-src 'self'; connect-src 'self';">

    <title>Free Coloring Pages for Kids – birds.family</title>
    <meta name="description" content="Free coloring pages for kids by birds.family. Published on Pinterest – follow us to get notified when new sheets arrive.">
    <meta name="robots" content="noindex">

    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="icon" type="image/png" href="../../images/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../../images/favicon.png">
    <link rel="manifest" href="../../manifest.json">

    <style>
        .coloring-placeholder {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--space-xxl) var(--space-sm);
        }

        .coloring-placeholder-inner {
            max-width: 540px;
        }

        .coloring-placeholder-icon {
            font-size: 4rem;
            margin-bottom: var(--space-md);
            line-height: 1;
        }

        .coloring-placeholder h1 {
            font-size: 2.2rem;
            margin-bottom: var(--space-sm);
        }

        .coloring-placeholder p {
            color: var(--gray-medium);
            font-size: 1.1rem;
            margin-bottom: var(--space-lg);
        }

        .pinterest-follow-btn img {
            height: 48px;
            width: auto;
            display: block;
        }

        .pinterest-follow-btn {
            display: inline-block;
            border-radius: 8px;
            overflow: hidden;
            transition: opacity 0.2s ease;
        }

        .pinterest-follow-btn:hover {
            opacity: 0.85;
        }

        .back-link {
            display: inline-block;
            margin-top: var(--space-lg);
            color: var(--mint-primary);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <main class="coloring-placeholder">
        <div class="coloring-placeholder-inner">
            <div class="coloring-placeholder-icon">🎨</div>
            <h1>Free Coloring Pages for Kids</h1>
            <p>
                New coloring pages coming soon — and published directly on Pinterest.<br>
                Follow us there to never miss a new sheet.
            </p>

            <a href="https://pinterest.com/birds_family/"
               class="pinterest-follow-btn"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="Follow birds.family on Pinterest">
                <img src="../../assets/pinterest/FollowOnPinterest_InteractiveLockup-GrayContainer.svg"
                     alt="Follow on Pinterest">
            </a>

            <br>
            <a href="../../" class="back-link">← back to birds.family</a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-tagline">Small apps. One purpose each.</p>
            <nav class="footer-links">
                <a href="../../privacy.html">Privacy Policy</a>
                <span class="separator">·</span>
                <a href="../../imprint.html">Imprint</a>
            </nav>
            <p class="footer-copyright">&copy; 2026 birds.family</p>
            <p class="footer-copyright">Thoughtfully made by <a href="https://lueders.app" target="_blank" rel="noopener noreferrer">lueders.app</a></p>
        </div>
    </footer>

</body>
</html>
